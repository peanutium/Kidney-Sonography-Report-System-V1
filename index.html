<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kidney Sonography Report System</title>

  <!-- Optional: prevents favicon.ico 404 in browser console -->
  <link rel="icon" href="data:,">

  <!-- CDN-only version: works on GitHub Pages without npm/build/Vite -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    const mkArray = (n) => Array.from({ length: n }, () => "");

    const parseNumber = (s) => {
      if (!s) return null;
      const m = String(s).replace(/,/g, ".").match(/\d*\.?\d+/);
      if (!m) return null;
      const num = parseFloat(m[0]);
      return Number.isFinite(num) ? num : null;
    };

    const cleanList = (arr) => arr.map(parseNumber).filter((v) => v !== null);

    const pluralize = (word, count) => (count === 1 ? word : word + "s");

    const countWord = (n) => {
      const words = [
        "Zero", "One", "Two", "Three", "Four", "Five", "Six", "Seven",
        "Eight", "Nine", "Ten", "Eleven", "Twelve", "Thirteen", "Fourteen",
        "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen", "Twenty"
      ];
      return (n >= 0 && n < words.length) ? words[n] : String(n);
    };

    // Example: 5.6cm, 5.7cm, and 6.5cm
    const joinDiameters = (nums) => {
      const formatted = nums.map((n) => `${n}cm`);
      if (formatted.length === 0) return "";
      if (formatted.length === 1) return formatted[0];
      if (formatted.length === 2) return `${formatted[0]} and ${formatted[1]}`;
      return `${formatted.slice(0, -1).join(", ")}, and ${formatted[formatted.length - 1]}`;
    };

    // Input examples accepted:
    // 10.6 x 4.2 cm, 10.6x4.2cm, 10.6 × 4.2
    // Output: 10.6x4.2cm
    const normalizeKidneySize = (raw) => {
      if (!raw || !raw.trim()) return "";
      const withoutCm = raw.replace(/cm/gi, "").trim();
      const match = withoutCm.match(/(\d*\.?\d+)\s*[x×]\s*(\d*\.?\d+)/i);
      if (match) return `${match[1]}x${match[2]}cm`;
      return withoutCm ? `${withoutCm}cm` : "";
    };

    function Section({ title, children }) {
      return (
        <section className="bg-white/80 rounded-2xl shadow p-5 border border-gray-100">
          <h2 className="text-lg font-semibold mb-3">{title}</h2>
          {children}
        </section>
      );
    }

    function LesionGrid({ title, arr, setArr }) {
      const onArrayChange = (idx, val) => {
        const next = [...arr];
        next[idx] = val;
        setArr(next);
      };

      return (
        <div>
          <div className="text-sm text-gray-700 mb-2">
            {title} <span className="text-gray-400">(up to 7; e.g., 7.53)</span>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            {arr.map((v, i) => (
              <input
                key={i}
                type="text"
                inputMode="decimal"
                value={v}
                onChange={(e) => onArrayChange(i, e.target.value)}
                placeholder={`#${i + 1}`}
                className="rounded-xl border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-300"
              />
            ))}
          </div>
        </div>
      );
    }

    function KidneySonographyReportSystem() {
      const [rkSize, setRkSize] = useState("");
      const [lkSize, setLkSize] = useState("");

      const [prominentSinus, setProminentSinus] = useState(true);
      const [cortexThickness, setCortexThickness] = useState("normal");
      const [echogenicity, setEchogenicity] = useState("normal");

      const [rkHypo, setRkHypo] = useState(mkArray(7));
      const [rkHyper, setRkHyper] = useState(mkArray(7));
      const [lkHypo, setLkHypo] = useState(mkArray(7));
      const [lkHyper, setLkHyper] = useState(mkArray(7));

      const rkHypoNums = useMemo(() => cleanList(rkHypo), [rkHypo]);
      const rkHyperNums = useMemo(() => cleanList(rkHyper), [rkHyper]);
      const lkHypoNums = useMemo(() => cleanList(lkHypo), [lkHypo]);
      const lkHyperNums = useMemo(() => cleanList(lkHyper), [lkHyper]);

      const rkHypoCount = rkHypoNums.length;
      const rkHyperCount = rkHyperNums.length;
      const lkHypoCount = lkHypoNums.length;
      const lkHyperCount = lkHyperNums.length;

      const anyStone = rkHyperCount + lkHyperCount > 0;
      const anyCyst = rkHypoCount + lkHypoCount > 0;

      const findings = useMemo(() => {
        const lines = [];
        const rkOut = normalizeKidneySize(rkSize);
        const lkOut = normalizeKidneySize(lkSize);

        lines.push(`- The right kidney measures ${rkOut}${rkOut ? "," : ""} and the left ${lkOut}.`);

        const sinusText = prominentSinus ? "Prominent renal sinus; " : "";
        lines.push(`- ${sinusText}${cortexThickness} cortex thickness with ${echogenicity} echogenicity of both kidneys.`);

        if (rkHypoCount > 0) {
          lines.push(`- ${countWord(rkHypoCount)} hypoechoic ${pluralize("lesion", rkHypoCount)} at right kidney, diameter ${joinDiameters(rkHypoNums)}, right renal ${pluralize("cyst", rkHypoCount)}.`);
        }

        if (rkHyperCount > 0) {
          lines.push(`- ${countWord(rkHyperCount)} hyperechoic ${pluralize("lesion", rkHyperCount)} at right kidney, diameter ${joinDiameters(rkHyperNums)}, right renal ${pluralize("stone", rkHyperCount)}.`);
        }

        if (lkHypoCount > 0) {
          lines.push(`- ${countWord(lkHypoCount)} hypoechoic ${pluralize("lesion", lkHypoCount)} at left kidney, diameter ${joinDiameters(lkHypoNums)}, left renal ${pluralize("cyst", lkHypoCount)}.`);
        }

        if (lkHyperCount > 0) {
          lines.push(`- ${countWord(lkHyperCount)} hyperechoic ${pluralize("lesion", lkHyperCount)} at left kidney, diameter ${joinDiameters(lkHyperNums)}, left renal ${pluralize("stone", lkHyperCount)}.`);
        }

        if (!anyStone) lines.push("- No renal stone or hydronephrosis.");
        if (!anyCyst) lines.push("- No cystic or mass lesion.");

        return lines.join("\n");
      }, [
        rkSize, lkSize, prominentSinus, cortexThickness, echogenicity,
        rkHypoCount, rkHyperCount, lkHypoCount, lkHyperCount,
        rkHypoNums, rkHyperNums, lkHypoNums, lkHyperNums,
        anyStone, anyCyst
      ]);

      const impression = useMemo(() => {
        const items = [];

        const normalParenchyma = cortexThickness === "normal" && echogenicity === "normal";
        const noLesions = !anyStone && !anyCyst;
        if (normalParenchyma && noLesions) items.push("Unremarkable renal sonography");

        if (echogenicity === "increased") {
          items.push("Chronic renal parenchymal disease of both kidneys");
        }

        if (rkHypoCount > 0) items.push(`Right renal ${pluralize("cyst", rkHypoCount)}`);
        if (rkHyperCount > 0) items.push(`Right renal ${pluralize("stone", rkHyperCount)}`);
        if (lkHypoCount > 0) items.push(`Left renal ${pluralize("cyst", lkHypoCount)}`);
        if (lkHyperCount > 0) items.push(`Left renal ${pluralize("stone", lkHyperCount)}`);

        return items.join("\n");
      }, [
        cortexThickness, echogenicity,
        rkHypoCount, rkHyperCount, lkHypoCount, lkHyperCount,
        anyStone, anyCyst
      ]);

      const fullReport = `Sonographic findings:\n${findings}\n\nImpression:\n${impression}`;

      const copyToClipboard = async (text) => {
        try {
          await navigator.clipboard.writeText(text);
          alert("Copied to clipboard!");
        } catch (e) {
          alert("Copy failed. Please select and copy manually.");
        }
      };

      const downloadTxt = (filename, text) => {
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const resetAll = () => {
        setRkSize("");
        setLkSize("");
        setProminentSinus(true);
        setCortexThickness("normal");
        setEchogenicity("normal");
        setRkHypo(mkArray(7));
        setRkHyper(mkArray(7));
        setLkHypo(mkArray(7));
        setLkHyper(mkArray(7));
      };

      return (
        <main className="max-w-6xl mx-auto p-6">
          <header className="mb-6">
            <h1 className="text-2xl md:text-3xl font-bold">Kidney Sonography Report System</h1>
            <p className="text-sm text-gray-600 mt-1">
              Fill the structured form. The report updates automatically. Decimals such as 7.53 are supported.
            </p>
          </header>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 items-start">
            <div className="lg:col-span-2 space-y-4">
              <Section title="Kidney Measurements">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <label className="text-sm">
                    <div className="font-medium text-gray-700 mb-1">Right kidney</div>
                    <input
                      type="text"
                      inputMode="text"
                      value={rkSize}
                      onChange={(e) => setRkSize(e.target.value)}
                      placeholder="e.g., 10.6 x 4.2 cm"
                      className="w-full rounded-xl border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                    />
                    <div className="text-xs text-gray-500 mt-1">
                      Output format: 10.6x4.2cm
                    </div>
                  </label>

                  <label className="text-sm">
                    <div className="font-medium text-gray-700 mb-1">Left kidney</div>
                    <input
                      type="text"
                      inputMode="text"
                      value={lkSize}
                      onChange={(e) => setLkSize(e.target.value)}
                      placeholder="e.g., 10.2 x 4.0 cm"
                      className="w-full rounded-xl border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                    />
                    <div className="text-xs text-gray-500 mt-1">
                      You may type 10.2x4.0cm, 10.2 × 4.0, or 10.2 x 4.0 cm.
                    </div>
                  </label>
                </div>
              </Section>

              <Section title="Parenchymal Features">
                <div className="flex flex-wrap items-center gap-4">
                  <label className="inline-flex items-center gap-2 text-sm">
                    <input
                      type="checkbox"
                      className="rounded"
                      checked={prominentSinus}
                      onChange={(e) => setProminentSinus(e.target.checked)}
                    />
                    <span>Prominent renal sinus</span>
                  </label>

                  <label className="text-sm inline-flex items-center gap-2">
                    Cortex thickness
                    <select
                      value={cortexThickness}
                      onChange={(e) => setCortexThickness(e.target.value)}
                      className="rounded-xl border border-gray-300 px-2 py-1"
                    >
                      <option value="normal">normal</option>
                      <option value="thinning">thinning</option>
                    </select>
                  </label>

                  <label className="text-sm inline-flex items-center gap-2">
                    Echogenicity
                    <select
                      value={echogenicity}
                      onChange={(e) => setEchogenicity(e.target.value)}
                      className="rounded-xl border border-gray-300 px-2 py-1"
                    >
                      <option value="normal">normal</option>
                      <option value="increased">increased</option>
                    </select>
                  </label>
                </div>
              </Section>

              <Section title="Lesions">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <LesionGrid title="Right kidney hypoechoic lesions (cysts)" arr={rkHypo} setArr={setRkHypo} />
                  <LesionGrid title="Right kidney HYPERechoic lesions (stones)" arr={rkHyper} setArr={setRkHyper} />
                  <LesionGrid title="Left kidney hypoechoic lesions (cysts)" arr={lkHypo} setArr={setLkHypo} />
                  <LesionGrid title="Left kidney HYPERechoic lesions (stones)" arr={lkHyper} setArr={setLkHyper} />
                </div>
              </Section>

              <button
                onClick={resetAll}
                className="px-4 py-2 rounded-2xl bg-gray-100 hover:bg-gray-200 border"
              >
                Reset
              </button>
            </div>

            <div className="space-y-4">
              <Section title="Sonographic findings">
                <pre className="whitespace-pre-wrap text-sm leading-6 bg-slate-50 rounded-xl p-3 border overflow-auto max-h-[340px]">
                  {findings}
                </pre>
                <div className="flex flex-wrap gap-2 mt-2">
                  <button
                    onClick={() => copyToClipboard(findings)}
                    className="px-3 py-2 rounded-2xl bg-indigo-600 text-white hover:bg-indigo-700"
                  >
                    Copy findings
                  </button>
                </div>
              </Section>

              <Section title="Impression">
                <pre className="whitespace-pre-wrap text-sm leading-6 bg-slate-50 rounded-xl p-3 border overflow-auto max-h-[300px]">
                  {impression}
                </pre>
                <div className="flex flex-wrap gap-2 mt-2">
                  <button
                    onClick={() => copyToClipboard(impression)}
                    className="px-3 py-2 rounded-2xl bg-indigo-600 text-white hover:bg-indigo-700"
                  >
                    Copy impression
                  </button>
                </div>
              </Section>

              <Section title="Full report">
                <div className="flex flex-wrap gap-2">
                  <button
                    onClick={() => copyToClipboard(fullReport)}
                    className="px-3 py-2 rounded-2xl bg-indigo-600 text-white hover:bg-indigo-700"
                  >
                    Copy full report
                  </button>
                  <button
                    onClick={() => downloadTxt("kidney_sonography_report.txt", fullReport)}
                    className="px-3 py-2 rounded-2xl bg-white border hover:bg-gray-50"
                  >
                    Download .txt
                  </button>
                </div>
              </Section>

              <div className="text-xs text-gray-500">
                <ul className="list-disc ml-4 space-y-1">
                  <li>No import/export statements are used.</li>
                  <li>This file can be deployed directly as index.html on GitHub Pages.</li>
                  <li>Favicon 404 is prevented by an inline empty favicon.</li>
                </ul>
              </div>
            </div>
          </div>

          <footer className="mt-8 text-center text-xs text-gray-500">
            © {new Date().getFullYear()} Kidney Sonography Report System
          </footer>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<KidneySonographyReportSystem />);
  </script>
</body>
</html>
